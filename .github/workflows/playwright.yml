name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: false
        default: ci
        type: choice
        options: [ci, staging, production]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: E2E Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npm test
        env:
          CI: true
          PLATFORM_ENDPOINT: ${{ secrets.PLATFORM_ENDPOINT }}
          PLATFORM_API_KEY: ${{ secrets.PLATFORM_API_KEY }}
          PLATFORM_TEAM_ID: ${{ vars.PLATFORM_TEAM_ID || 'automation-team-gamma' }}
          PLATFORM_PROJECT_ID: ${{ vars.PLATFORM_PROJECT_ID || 'shop-labs' }}

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results (traces / screenshots / videos)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 7
